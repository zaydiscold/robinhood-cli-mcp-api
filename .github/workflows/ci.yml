name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref so stale pushes don't burn CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # HIGH/CRITICAL advisories stop the merge. The remaining LOW `cli` finding is a pnpm audit
      # false positive: it mistakes this workspace's `cli/` package for the unrelated npm package.
      - run: pnpm audit --audit-level high
      - run: pnpm quality

  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one OS/node combo failing mask the others — the cross-platform .env parsing
      # (CRLF / BOM), repo-root resolution, and resolveBash behavior are exactly the surfaces
      # that need full-matrix signal. The old CI was single-OS (ubuntu) on the unstable Node 24,
      # so a Windows-only regression in the auth path would have shipped green.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22] # LTS lines; replaces the non-LTS Node 24 the old CI pinned
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # TypeScript compilation is the type gate and emits the exact dist files exercised below.
      - name: Build + typecheck (cli + mcp)
        run: pnpm build
      - name: Test built workspace (vitest — incl. cross-platform .env, resolveBash, gate/cap guards)
        run: pnpm test:built
      - name: Coverage ratchet (canonical Linux/Node 20 job)
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: pnpm coverage:built
      - name: Generated API map is committed and current
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: |
          pnpm generate:api-map
          git diff --exit-code -- api-map
