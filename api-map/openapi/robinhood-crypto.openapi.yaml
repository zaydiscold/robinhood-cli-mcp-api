      description: "This endpoint returns the estimated total cost or credit for a\
        \ particular symbol, book side, and asset quantity. You can include a list\
        \ of quantities in a single request to retrieve the price for various hypothetical\
        \ order sizes. \n\nThe estimated price represents the expected execution price\
        \ if you were to subsequently place an order. To estimate the cost for a Buy\
        \ order, request an Ask quote. If you are preparing to place a Sell order,\
        \ request a Bid quote. The execution price may vary due to market volatility\
        \ and once executed the transaction may not be undone.\n\nThe bid and ask\
        \ prices are the best prices our market makers provide for an order, inclusive\
        \ of a spread. The buy spread is the percent difference between the ask and\
        \ the mid price. The sell spread is the percent difference between the bid\
        \ and the mid price."
      operationId: api_v1_crypto_marketdata_estimated_price
      parameters:
