tags:
- name: V2 Account
  x-displayName: Account
- name: V2 Market Data
  x-displayName: Market Data
- name: V2 Trading
  x-displayName: Trading
components:
  requestParameters:
    TimeInForce:
      description: 'The time in force of the order.


        - **Good til canceled (gtc):** The order remains open until it''s filled or
        the user cancels it.


        - **Good for day (gfd):** The order remains open until the end of the day
        or when the user cancels it.


        - **Good for week (gfw):** The order remains open until the end of the week
        or when the user cancels it.


        - **Good for month (gfm):** The order remains open until the end of the month
        or when the user cancels it.'
      type: string
      enum:
      - gtc
      - gfd
      - gfw
      - gfm
  schemas:
    Account:
      type: object
      properties:
        account_number:
          title: Account number
          description: The account number of the crypto account
          type: string
          readOnly: true
        status:
          title: Status
          description: User account status for trading
          type: string
          enum:
          - active
          - deactivated
          - sell_only
        buying_power:
          title: Buying power
          description: User buying power amount in fiat currency
          type: string
          readOnly: true
        buying_power_currency:
          title: Buying power currency
          description: 'Example: USD'
          type: string
          readOnly: true
    V2Account:
      type: object
      properties:
        account_number:
          title: Account number
          description: The unique account number identifier.
          type: string
        status:
          title: Status
          description: The current status of the account.
          type: string
          enum:
          - active
          - deactivated
          - sell_only
        buying_power:
          title: Buying power
          description: The available buying power in the account.
          type: string
        buying_power_currency:
          title: Buying power currency
          description: The currency of the buying power (e.g., "USD").
          type: string
        account_type:
          title: Account type
          description: The type of account (e.g., individual).
          type: string
        is_api_tradable:
          title: Is API tradable
          description: Indicates whether the account can be used for API trading.
            True for the default account.
          type: boolean
        fee_tier_status:
          title: Fee tier status
          description: Optional. Fee tier information for the account, if available.
            See object fields below.
          allOf:
          - $ref: '#/components/schemas/FeeTierStatus'
    FeeTierStatus:
      type: object
      properties:
        fee_ratio:
          title: Fee ratio
          description: The current fee ratio applied to the value executed for each
            order.
          type: number
          format: double
        thirty_day_volume:
          title: Thirty day volume
          description: Trailing 30-day trading volume of crypto fee tier orders.
          type: number
          format: double
        next_fee_tier_ratio:
          title: Next fee tier ratio
          description: Optional. The fee ratio for the next tier. Null if already
            at the highest tier (lowest fee).
          type: number
          format: double
          nullable: true
        next_fee_tier_threshold:
          title: Next fee tier threshold
          description: Optional. The trading volume required to reach the next fee
            tier. Null if already at the highest tier (lowest fee).
          type: number
          format: double
          nullable: true
    V2AccountsResponse:
      type: object
      properties:
        next:
          title: Next
          description: URI for the next page of results. Null if there are no more
            pages.
          type: string
          nullable: true
        previous:
          title: Previous
          description: URI for the previous page of results. Null if on the first
            page.
          type: string
          nullable: true
        results:
          title: Results
          description: 'Array of account objects with the following fields:'
          type: array
          items:
            $ref: '#/components/schemas/V2Account'
    V2TradingPair:
      type: object
      properties:
        symbol:
          title: Symbol
          description: The trading pair symbol (e.g., "BTC-USD").
          type: string
        asset_code:
          title: Asset code
          description: The code for the asset currency (e.g., "BTC").
          type: string
        quote_code:
          title: Quote code
          description: The code for the quote currency (e.g., "USD").
          type: string
        asset_increment:
          title: Asset increment
          description: The minimum quantity increment for placing orders in the asset
            currency. Up to 18 decimal places.
          type: string
        quote_increment:
          title: Quote increment
          description: The minimum price increment for placing orders in the quote
            currency. Up to 18 decimal places.
          type: string
        max_order_size:
          title: Max order size
          description: The maximum order size allowed for this trading pair in asset
            currency. Up to 16 decimal places.
          type: string
        min_order_amount:
          title: Min order amount
          description: The minimum order amount in quote currency (e.g., USD) required
            for fee tier orders.
          type: string
        status:
          title: Status
          description: The tradability status of the trading pair.
          type: string
        is_api_tradable:
          title: Is API tradable
          description: Indicates whether the trading pair is supported on API trading
            v2 endpoints (**Place crypto orders with fee tiers**).
          type: boolean
    V2TradingPairsResponse:
      type: object
      properties:
        next:
          title: Next
          description: URI for the next page of results. Null if there are no more
            pages.
          type: string
          nullable: true
        previous:
          title: Previous
          description: URI for the previous page of results. Null if on the first
            page.
          type: string
          nullable: true
        results:
          title: Results
          description: Array of trading pair objects.
          type: array
          items:
            $ref: '#/components/schemas/V2TradingPair'
    V2Holding:
      type: object
      properties:
        account_number:
          title: Account number
          description: The account number that holds this asset.
          type: string
        asset_code:
          title: Asset code
          description: The code for the crypto asset (e.g., "BTC", "ETH").
          type: string
        total_quantity:
          title: Total quantity
          description: The total quantity of the asset held in the account, including
            any amounts that are not available for trading.
          type: string
        quantity_available_for_trading:
          title: Quantity available for trading
          description: The quantity of the asset that is currently available for trading
            (not locked in pending orders or other operations).
          type: string
    V2HoldingsResponse:
      type: object
      properties:
        next:
          title: Next
          description: URI for the next page of results. Null if there are no more
            pages.
          type: string
          nullable: true
        previous:
          title: Previous
          description: URI for the previous page of results. Null if on the first
            page.
          type: string
          nullable: true
        results:
          title: Results
          description: Array of holding objects.
          type: array
          items:
            $ref: '#/components/schemas/V2Holding'
    V2BestBidAsk:
      type: object
      properties:
        symbol:
          title: Symbol
          description: Currency pair symbol.
          type: string
        bid:
          title: Bid
          description: The best price our partner exchanges provide for a sell order.
          type: number
          format: double
        ask:
          title: Ask
          description: The best price our partner exchanges provide for a buy order.
          type: number
          format: double
    V2BestBidAskResponse:
      type: object
      properties:
        results:
          title: Results
          description: Array of bid/ask price objects.
          type: array
          items:
            $ref: '#/components/schemas/V2BestBidAsk'
    V2EstimatedPrice:
      type: object
      properties:
        symbol:
          title: Symbol
          description: The trading pair symbol.
          type: string
        side:
          title: Side
          description: Order quote side (bid or ask).
          type: string
          enum:
          - bid
          - ask
        quantity:
          title: Quantity
          description: Quantity of base currency.
          type: number
          format: double
        timestamp:
          title: Timestamp
          description: The time when the price was retrieved from our system.
          type: string
          format: date-time
        bid:
          title: Bid
          description: The best price our partner exchanges provide for a sell order.
          type: number
          format: double
        ask:
          title: Ask
          description: The best price our partner exchanges provide for a buy order.
          type: number
          format: double
        fee_ratio:
          title: Fee ratio
          description: The fee ratio applied to the value executed for each order.
            For example, 0.0085 corresponds to a 0.85% trading fee.
          type: number
          format: double
        est_fee:
          title: Estimated fee
          description: The estimated transaction fee in quote currency (e.g., USD).
            Calculated as fee_ratio * (price * quantity).
          type: number
          format: double
        est_total_cost:
          title: Estimated total cost
          description: The estimated total cost in quote currency for a buy order,
            including the fee. Calculated as quantity * ask + est_fee.
          type: number
          format: double
        est_total_credit:
          title: Estimated total credit
          description: The estimated total credit in quote currency for a sell order,
            after deducting the fee. Calculated as quantity * bid - est_fee.
          type: number
          format: double
    V2EstimatedPriceResponse:
      type: object
      properties:
        results:
          title: Results
          description: Array of estimated price objects.
          type: array
          items:
            $ref: '#/components/schemas/V2EstimatedPrice'
    V2CryptoOrder:
      type: object
      description: V2 Crypto order with fee tier information. Includes all V1 order
        fields plus fee_charged and estimated_fee_remaining.
      allOf:
      - $ref: '#/components/schemas/OrderResponse'
      - type: object
        properties:
          fee_charged:
            title: Fee charged
            description: The total fee amount that was charged for this order based
              on executed fills.
            type: number
            format: double
          estimated_fee_remaining:
            title: Estimated fee remaining
            description: The estimated fee amount that will be charged on the remaining
              unfilled quantity of the order. The amount depends on the execution
              price and may vary due to market volatility.
            type: number
            format: double
    V2OrdersResponse:
      type: object
      properties:
        next:
          title: Next
          description: URI for the next page of results. Null if there are no more
            pages.
          type: string
          nullable: true
        previous:
          title: Previous
          description: URI for the previous page of results. Null if on the first
            page.
          type: string
          nullable: true
        results:
          title: Results
          description: Array of order objects with fee information.
          type: array
          items:
            $ref: '#/components/schemas/V2CryptoOrder'
    BidAskPrice:
      type: object
      properties:
        symbol:
          title: Symbol
          description: Currency pair symbol
          type: string
        price:
          title: Price
          description: Midpoint of `bid_inclusive_of_sell_spread` and `ask_inclusive_of_buy_spread`
          type: number
          format: double
        bid_inclusive_of_sell_spread:
          title: Bid inclusive of sell spread
          description: The best price our market makers provide for a sell order inclusive
            of the sell spread
          type: number
          format: double
        sell_spread:
          title: Sell spread
          description: The percent difference between the bid and the mid price, included
            in `bid_inclusive_of_sell_spread`
          type: number
          format: double
        ask_inclusive_of_buy_spread:
          title: Ask inclusive of buy spread
          description: The best price our market makers provide for a buy order inclusive
            of the buy spread
          type: number
          format: double
        buy_spread:
          title: Buy spread
          description: The percent difference between the ask and the mid price, included
            in `ask_inclusive_of_buy_spread`
          type: number
          format: double
        timestamp:
          title: Timestamp
          description: The time when the price was retrieved from our system
          type: string
    EstimatedPrice:
      type: object
      properties:
        symbol:
          title: Symbol
          description: Currency pair symbol
          type: string
        side:
          title: Side
          description: Order quote side
          type: string
          enum:
          - bid
          - ask
        price:
          title: Price
          description: Midpoint of `bid_inclusive_of_sell_spread` and `ask_inclusive_of_buy_spread`
          type: number
          format: double
        quantity:
          title: Quantity
          description: Quantity of base currency
          type: number
          format: double
        bid_inclusive_of_sell_spread:
          title: Bid inclusive of sell spread
          description: ' The best price our market makers  provide for a sell order
            inclusive of the sell spread'
          type: number
          format: double
        sell_spread:
          title: Sell spread
          description: The percent difference between the bid and the mid price, included
            in `bid_inclusive_of_sell_spread`
          type: number
          format: double
        ask_inclusive_of_buy_spread:
          title: Ask inclusive of buy spread
          description: The best price our market makers provide for a buy order inclusive
            of the buy spread
          type: number
          format: double
        buy_spread:
          title: Buy spread
          description: The percent difference between the ask and the mid price, included
            in `ask_inclusive_of_buy_spread`
          type: number
          format: double
        timestamp:
          title: Timestamp
          description: The time when the price was retrieved from our system
          type: string
    Holdings:
      type: object
      properties:
        account_number:
          title: The account number of the crypto account
          type: string
        asset_code:
          title: Asset currency code
          type: string
        total_quantity:
          title: Total coin quantity user holds
          type: number
          format: double
        quantity_available_for_trading:
          title: Available coin quantity user can trade (sell)
          type: number
          format: double
    TradingPair:
      type: object
      properties:
        asset_code:
          title: Asset currency code
          description: 'Example: BTC'
          type: string
        quote_code:
          title: Quote currency code
          description: 'Example: USD'
          type: string
        quote_increment:
          title: Quote increment
          description: The precision of the currency price increment.
          type: string
        asset_increment:
          title: Asset increment
          description: The precision of the order of the currency quantity increment.
          type: string
        max_order_size:
          title: Maximum order size
          description: The largest quantity a user can place for the coin per order.
          type: string
        min_order_size:
          title: Minimum order size
          description: The smallest quantity a user has to place for the coin per
            order.
          type: string
        status:
          title: Status
          description: The status of the currency pair.
          type: string
          enum:
          - tradable
          - untradable
          - sellonly
        symbol:
          title: Symbol for this currency pair
          description: 'Example: BTC-USD'
          type: string
    OrderResponse:
      type: object
      properties:
        id:
          title: Order ID
          description: Unique per order
          type: string
          format: uuid
        account_number:
          title: Account number
          description: The account number of the crypto account
          type: string
        symbol:
          title: Symbol
          description: Currency pair symbol
          type: string
        client_order_id:
          title: Client order ID
          description: User input order id for idempotency validation
          type: string
          format: uuid
        side:
          title: Side
          description: Buy or sell
          type: string
          enum:
          - buy
          - sell
        executions:
          items:
            $ref: '#/components/schemas/OrderExecution'
          readOnly: true
          type: array
        type:
          description: Type of order
          type: string
          enum:
          - limit
          - market
          - stop_limit
          - stop_loss
        state:
          description: State of the order
          type: string
          enum:
          - open
          - canceled
          - partially_filled
          - filled
          - failed
        average_price:
          description: Average price of all executions
          type: number
          format: double
          nullable: true
        filled_asset_quantity:
          description: Portion of total amount that have been filled
          type: number
          format: double
        created_at:
          description: The timestamp of when the order was created
          type: string
        updated_at:
          description: The timestamp of when the order was updated
          type: string
        market_order_config:
          description: Order configuration for market orders
          type: object
          properties:
            asset_quantity:
              description: The quantity of base currency bought or sold
              type: number
              format: double
        limit_order_config:
          description: Order configuration for limit orders
          type: object
          properties:
            quote_amount:
              description: The amount of quote currency bought or sold
              type: number
              format: double
            asset_quantity:
              description: The quantity of base currency bought or sold
              type: number
              format: double
            limit_price:
              description: The limit price of the order bought or sold
              type: number
              format: double
        stop_loss_order_config:
          description: Order configuration for stop loss orders
          type: object
          properties:
            quote_amount:
