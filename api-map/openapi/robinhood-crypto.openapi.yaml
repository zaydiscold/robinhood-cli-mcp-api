        between the bid and the mid price.


        Note that in the v2 endpoint, **Place crypto orders with fee tiers**, partner
        exchanges provide prices instead of market makers, with orders routed accordingly.
        For more information on routing, visit our [<u>Help Center</u>](https://robinhood.com/us/en/support/articles/crypto-order-routing/).'
