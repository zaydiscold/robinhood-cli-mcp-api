      - name: cursor
        description: Optional cursor for pagination.
        in: query
        schema:
          type: string
      - name: created_at_start
        description: Filter orders created on or after this timestamp (ISO 8601 format).
        in: query
        schema:
          type: string
          format: date-time
      - name: created_at_end
        description: Filter orders created on or before this timestamp (ISO 8601 format).
        in: query
        schema:
          type: string
          format: date-time
      - name: updated_at_start
        description: Filter orders updated on or after this timestamp (ISO 8601 format).
        in: query
        schema:
          type: string
          format: date-time
      - name: updated_at_end
        description: Filter orders updated on or before this timestamp (ISO 8601 format).
        in: query
        schema:
          type: string
          format: date-time
      - name: symbol
        description: Filter orders by trading pair symbol.
        in: query
        schema:
          type: string
      - name: side
        description: Filter orders by side.
        in: query
        schema:
          type: string
