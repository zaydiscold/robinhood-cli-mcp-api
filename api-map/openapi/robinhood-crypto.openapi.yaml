                $ref: '#/components/schemas/ErrorResponse'
              example:
                type: client_error
                errors:
                - detail: string
                  attr: null
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                type: client_error
                errors:
                - detail: string
                  attr: null
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
