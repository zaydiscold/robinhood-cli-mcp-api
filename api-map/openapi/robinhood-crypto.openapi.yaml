  /api/v2/crypto/trading/estimated_price/:
    security:
    - API Key: []
      API Signature: []
      Timestamp: []
    get:
      tags:
      - V2 Market Data
      summary: Get Estimated Price
      description: 'This endpoint returns the estimated total cost or credit for a
        particular symbol, book side, asset quantity, and fee. You can include a list
        of quantities in a single request to retrieve the price for various hypothetical
        order sizes.


        The estimated price represents the expected execution price if you were to
        subsequently place an order. The execution price may vary due to market volatility
        and once executed the transaction may not be undone.


        The bid and ask prices are the best prices our partner exchanges provide for
        an order, excluding the fee.'
      operationId: api_v2_crypto_marketdata_estimated_price
      parameters:
      - name: symbol
        description: A string matching a valid currency pair, for example `BTC-USD`.
          Ensure that the symbol is provided in all uppercase. Only USD symbols that
          have `is_api_tradable=true` as defined in our Get Crypto Trading Pairs endpoint
          are accepted.
        example: BTC-USD
        in: query
        required: true
        schema:
          type: string
      - name: side
        description: 'Order side: `bid`, `ask`, or `both`.'
        example: bid
        in: query
        required: true
        schema:
          type: string
          enum:
          - bid
          - ask
          - both
      - name: quantity
        description: Quantity must be smaller than `max_order_size` as defined in
          our Get Crypto Trading Pairs endpoint. Multiple quantities can be comma-separated.
          A max of 10 quantities can be specified for each request.
        example: 0.1,1,1.999
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V2EstimatedPriceResponse'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                type: validation_error
                errors:
                - detail: string
                  attr: string
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                type: client_error
                errors:
                - detail: string
                  attr: null
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                type: client_error
                errors:
                - detail: string
                  attr: null
  /api/v2/crypto/trading/orders/:
    security:
