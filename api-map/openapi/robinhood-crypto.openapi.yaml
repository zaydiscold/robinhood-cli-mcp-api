  securitySchemes:
    API Key:
      type: apiKey
      description: 'The "`x-api-key`" header should contain your API key. This API
        key is obtained from your [crypto account settings](https://robinhood.com/account/crypto)
        when enrolling in the Robinhood Crypto Trading API program.


        ****API keys issued after August 13, 2024 will be formatted as "`rh-api-[uuid]`."
        Functionality will remain the same, and older keys will keep the original
        formatting (no "`rh-api`" prepend).***'
      name: x-api-key
      in: header
    API Signature:
      type: apiKey
      description: "Authenticated requests should be signed with the \"`x-signature`\"\
        \ header, using a signature generated with the following: private key, API\
        \ key, timestamp, path, method, and body.\n Here\u2019s how the message signature\
        \ should be defined:\n```console\nmessage = f\"{api_key}{current_timestamp}{path}{method}{body}\"\
        \n```\n****Note that for requests without a body, the body can be omitted\
        \ from the message signature.***\n\n### Example Signature\n\nThe following\
        \ is an example of a signature that corresponds to a cancel order request.\
        \ You may use the example values below to ensure your code implementation\
        \ is generating the same (`x-signature`) header signature value. The code\
        \ snippet is for generating the signature in Python.\n\n| Field | Value |\n\
        |-|-|\n| Private Key | xQnTJVeQLmw1/Mg2YimEViSpw/SdJcgNXZ5kQkAXNPU= |\n| Public\
        \ Key | jPItx4TLjcnSUnmnXQQyAKL4eJj3+oWNNMmmm2vATqk= |\n| API Key | rh-api-6148effc-c0b1-486c-8940-a1d099456be6\
        \ |\n| Method | POST |\n| Path | /api/v1/crypto/trading/orders/ |\n| Body\
        \ | {\"client_order_id\":\"131de903-5a9c-4260-abc1-28d562a5dcf0\",\"side\"\
        :\"buy\",\"type\":\"market\",\"symbol\":\"BTC-USD\",\"market_order_config\"\
        :{\"asset_quantity\":\"0.1\"}} |\n| Timestamp |  1698708981 |\n| __API Signature\
        \ Header__ | __q/nEtxp/P2Or3hph3KejBqnw5o9qeuQ+hYRnB56FaHbjDsNUY9KhB1asMxohDnzdVFSD7StaTqjSd9U9HvaRAw==__\
        \ |\n\n### Code Example\n\n#### Python\n```python\nimport nacl.signing\nimport\
        \ base64\nimport time\n\n# Replace these with your base64-encoded keys\nprivate_key_base64\
        \ = \"xQnTJVeQLmw1/Mg2YimEViSpw/SdJcgNXZ5kQkAXNPU=\"\npublic_key_base64 =\
        \ \"jPItx4TLjcnSUnmnXQQyAKL4eJj3+oWNNMmmm2vATqk=\"\n\napi_key = \"rh-api-6148effc-c0b1-486c-8940-a1d099456be6\"\
        \n\n# Get the current Unix timestamp in seconds\n# You can get the current_timestamp\
        \ with the following code:\n# current_timestamp = int(time.time())\n# This\
        \ value is hardcoded for demonstration purposes to match the example in the\
        \ documentation\ncurrent_timestamp = \"1698708981\"\n\npath = f\"/api/v1/crypto/trading/orders/\"\
        \n\nmethod = \"POST\"\n\nbody = {\n    \"client_order_id\": \"131de903-5a9c-4260-abc1-28d562a5dcf0\"\
        ,\n    \"side\": \"buy\",\n    \"symbol\": \"BTC-USD\",\n    \"type\": \"\
        market\",\n    \"market_order_config\": {\n        \"asset_quantity\": \"\
        0.1\"\n    },\n}\n\n# Convert base64 strings to seed (for private key) and\
        \ bytes (for public key)\nprivate_key_seed = base64.b64decode(private_key_base64)\n\
        public_key_bytes = base64.b64decode(public_key_base64)\n\n# Create private\
        \ key (from seed) and public key (from bytes)\nprivate_key = nacl.signing.SigningKey(private_key_seed)\n\
        public_key = nacl.signing.VerifyKey(public_key_bytes)\n\n# Create the message\
        \ to sign\nmessage = f\"{api_key}{current_timestamp}{path}{method}{body}\"\
        \n\n# Sign the message\nsigned = private_key.sign(message.encode(\"utf-8\"\
        ))\n\nbase64_signature = base64.b64encode(signed.signature).decode(\"utf-8\"\
        )\nprint(base64_signature)\n\n# Verify the signature\npublic_key.verify(signed.message,\
        \ signed.signature)\n\n\n```"
      name: x-signature
      in: header
    Timestamp:
      type: apiKey
      description: "The \"`x-timestamp`\" header should contain the timestamp of the\
        \ request.\n\n**To protect the security and integrity of your API interactions,\
        \ timestamps are only valid for 30 seconds after they\u2019re generated, and\
        \ an expired timestamp will be rejected. Therefore, ensure that your requests\
        \ are made promptly after generating the timestamp.**\n\nBelow is an example\
        \ in Python on how to generate the timestamp. \n\n```python\nimport time\n\
        \ncurrent_timestamp = int(time.time())\nprint(current_timestamp)\n```"
      name: x-timestamp
      in: header
