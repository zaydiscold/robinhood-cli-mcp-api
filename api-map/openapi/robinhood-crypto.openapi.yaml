    post:
      tags:
      - V2 Trading
      summary: Place New Crypto Order
      description: 'Place a new crypto trading order with an order type. This endpoint
        only supports placing orders on USD symbols that have `is_api_tradable=true`
        as defined in our Get Crypto Trading Pairs endpoint.


        **Note:** Depending on the type used in the request body, you must include
        the respective order configuration in the request body.


        For order configurations that support both `asset_quantity` or `quote_amount`,
        only one can be present in the request body.'
