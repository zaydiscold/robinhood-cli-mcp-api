        example: bid
        required: true
        schema:
          type: string
          enum:
          - bid
          - ask
          - both
      - name: quantity
        in: query
        description: "Quantity must be between `min_order_size` and `max_order_size`\
          \ as defined in our `Get Crypto Trading Pairs` endpoint.\n\n A max of 10\
          \ quantities can be specified for each request."
